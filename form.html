<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center; 
        }

        .form-container{
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }

        h1{
            text-align: center;
            color: #00bcd4;
            margin-bottom: 30px;
        }

        form{
            display: flex;
            flex-direction: column;
        }

        .form-group{
            margin-bottom: 20px;/* Espaçamento para baixo */
        }
        
        label{
            font-weight: bold; /* tipo da letra, expessura e etc, aqui deixa em negrito */
            margin-bottom: 5px; /* Espaçamento para baixo */
            display: block; /* não se movimentar e não ser afetado por estilo dos outros elementos*/
        }   

        input,
        textarea,
        select, 
        button{
            width: 100%;/* aumentar par a100% do espaço do elemento*/
            padding: 12px; /* espaçamento interno para todos os lados */
            margin-top: 5px; /* espaçamento externo para cima */
            border-radius: 5px; /* arrendondar as bordas */
            border: 1px solid #ccc; /* borda do campo suave para ficar com aspecto clean */
            font-size: 14px;/* tamanho da fonte */
            box-sizing: border-box; /* tamanho total do campo */
            background-color: #f0f8ff; /* muda cor do fundo */
        }

        input[type="radio"],
        input[type="checkbox"]{ /* seleciona os input radio e checkbox */
            display: inline-block; /*  mantém tudo na mesma linhas */
            width: auto; /* tamanho automático */
            margin-right: 10px; /* espaçamento para a direita */
        }

        button{
            background-color: #00bcd4; /* cor do fundo */
            color: white; /* cor das letras */
            border: none; /* tirar as bordas  */
            cursor: pointer; /* mudar o cursor para a maozinha */
            transition: background-color 0.3s;
        }
        
        button:hover{ /* quando passa o mouse em cima */
            background-color: #0097A7;
        }

        fieldset{
            border: #2c96a2 2px solid;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    
    <div class="form-container">
        <a href="./index.html"><img src="./back.png" alt="voltar" width="30" height="30"></a>

        <h1>Formulário</h1>

        <form method="POST" action="http://3003/usuarios">
            <input type="hidden" name="id" value="3">

            <div class="form-group">
                <label for="name">Nome</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input 
                    type="password" 
                    name="senha" 
                    id="senha"
                    placeholder="Digite sua senha">
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea 
                    name="bio" 
                    id="bio" 
                    cols="30"
                    rows="10"
                    placeholder="Conte um pouco sobre você"
                ></textarea>
            </div>
            <fieldset class="form-group">
                <legend>Tipo de Usuário</legend>
                <label for="admin">
                    <input 
                        type="radio" 
                        id="admin" 
                        name="tipo"
                        value="admin">Admin
                </label>
                <label for="regular">
                    <input 
                        type="radio" 
                        name="tipo" 
                        id="regular"
                        value="regular">Regular
                </label>
                <label for="professor">
                    <input 
                        type="radio"
                        name="tipo"
                        id="professor"
                        value="professor">Professor
                </label>
            </fieldset>

            <div class="form-group">
                <label for="estado">Estado</label>
                <select name="estado" id="estado">
                    <option value="">Selecione</option>
                    <option value="pr">Paraná</option>
                    <option value="sc">Santa Catarina</option>
                    <option value="rs">Rio Grande do Sul</option>
                </select>
            </div>

            <div class="form-group">
                <label for="interesses">Interesses</label>
                <select name="interesses" id="interesses" multiple size="7">
                    <option value="js">JavaScript</option>
                    <option value="java">Java</option>
                    <option value="php">PHP</option>
                    <option value="go">Go</option>
                    <option value="c">C</option>
                    <option value="c++">C++</option>
                    <option value="c#">C#</option>
                </select>
            </div>

            <div class="form-group buttons">
                <button type="submit">
                    Incluir
                </button>
                <button formaction="http://localhost:3003/usuarios/3" type="submit">
                    Alterar
                </button>
            </div>
        </form>
    </div>
</body>
</html>
